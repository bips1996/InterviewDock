version: '3.8'

services:
  postgres:
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-interviewdock}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  backend:
    environment:
      NODE_ENV: production
      DB_LOGGING: ${DB_LOGGING:-false}
      # Backup restore can be configured via environment variable
      # Set RESTORE_BACKUP=/path/to/backup.sql.gz to restore on startup
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    # Migrations run automatically on startup
    # To restore from backup, set RESTORE_BACKUP env variable
    command: node dist/index.js
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
